# ============================================================================
# Pi-hole Blocklist Optimizer - Blocklist Configuration
# ============================================================================
#
# This file defines blocklists that will be downloaded and optimized.
# Each blocklist is downloaded, processed, and combined into category-specific
# production lists in the pihole_blocklists_prod/ directory.
#
# FORMAT:
#   url|name|category
#
# EXAMPLES:
#   https://adaway.org/hosts.txt|adaway|advertising
#   https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts|stevenblack|comprehensive
#   https://v.firebog.net/hosts/Prigent-Malware.txt|prigent_malware|malicious
#
# SUPPORTED CATEGORIES:
#   - comprehensive    Multi-category curated lists
#   - advertising      Ad networks and ad servers
#   - tracking         Analytics, telemetry, and user tracking
#   - malicious        Malware, phishing, ransomware, and security threats
#   - suspicious       Spam, scams, and potentially unwanted content
#   - nsfw             Adult content
#   - custom           Create your own categories
#
# SUPPORTED FORMATS:
#   The optimizer automatically detects and handles:
#   - Plain domain lists (one domain per line)
#   - Hosts file format (0.0.0.0 domain or 127.0.0.1 domain)
#   - AdBlock Plus format (||domain^)
#   - Comments and metadata are preserved when possible
#
# NOTES:
#   - Lists are downloaded in parallel (default: 4 threads)
#   - Duplicates are automatically removed across all lists
#   - Failed downloads are automatically disabled with #DISABLED: prefix
#   - Invalid domains are filtered out during optimization
#   - To disable a specific list, add # at the beginning of the line
#   - Use --skip-download to work with existing downloaded files
#
# PROCESSING WORKFLOW:
#   1. Download all blocklists (saved to temp/ directory)
#   2. Optimize and validate domains
#   3. Apply whitelist filtering (if configured)
#   4. Deduplicate across all lists
#   5. Create category-specific production lists
#   6. Generate statistics and reports
#   7. Clean up temporary files (unless --skip-delete is used)
#
# ============================================================================

