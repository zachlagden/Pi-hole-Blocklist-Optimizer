# ============================================================================
# Pi-hole Blocklist Optimizer - Whitelist Configuration
# ============================================================================
#
# This file defines whitelists that will be applied to downloaded blocklists.
# Any domain found in these whitelists will be REMOVED from the final output.
#
# FORMAT:
#   url|name|whitelist
#   OR
#   file:///absolute/path/to/file.txt|name|whitelist
#
# EXAMPLES:
#   Remote URL:
#     https://example.com/whitelist.txt|example_whitelist|whitelist
#
#   Local file (absolute path):
#     file:///root/my-custom-whitelist.txt|my_whitelist|whitelist
#
#   Local file (relative to script directory):
#     file://./my-whitelist.txt|local_whitelist|whitelist
#
# SUPPORTED FORMATS:
#   - Plain domain lists (one domain per line)
#   - Hosts file format (0.0.0.0 domain or 127.0.0.1 domain)
#   - AdBlock Plus format (||domain^)
#   - Comments are ignored (lines starting with #)
#
# NOTES:
#   - Whitelists are processed AFTER all blocklists are downloaded
#   - Domains are case-insensitive
#   - Wildcards are NOT supported (exact domain matches only)
#   - To disable whitelist processing, use: --skip-whitelist flag
#   - To disable a specific whitelist, add # at the beginning of the line
#
# ============================================================================

# Example: Anudeep's Whitelist (commonly whitelisted domains for functionality)
# https://raw.githubusercontent.com/anudeepND/whitelist/master/domains/whitelist.txt|anudeep_whitelist|whitelist

# Example: Local custom whitelist
# file:///root/custom-whitelist.txt|custom_whitelist|whitelist

# Add your whitelist sources below:
# url_or_file_path|name|whitelist
